name: Android APK Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Build with Gradle
      working-directory: ios/runanywhere-sdks-latest/Playground/android-use-agent
      env:
        JAVA_TOOL_OPTIONS: "-Xmx3g -XX:MaxMetaspaceSize=512m"
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-app-apk
        path: ios/runanywhere-sdks-latest/Playground/android-use-agent/app/build/outputs/apk/debug/*.apk
